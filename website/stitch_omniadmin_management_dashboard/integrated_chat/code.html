<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Chat · Text &amp; Photos</title>
<!-- Material Symbols -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: light dark; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  html, body { height: 100%; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

  /* Custom scrollbar for the message area */
  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-track { background: transparent; }
  .chat-scroll::-webkit-scrollbar-thumb {
    background-color: rgba(120,128,150,0.45);
    border-radius: 10px;
  }

  /* Message entrance animation */
  .msg-in { animation: msgIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Typing dots */
  .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
  .typing-dot:nth-child(1) { animation-delay: -0.32s; }
  .typing-dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes typing {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Hide the native file input */
  .visually-hidden {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }
</style>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          brand:   { DEFAULT: "#003ec7", soft: "#eaf0ff", softborder: "#b7c4ff", dark: "#5b8bff" },
          page:    { light: "#eef1f7", dark: "#0d0f14" },
          panel:   { light: "#ffffff", dark: "#161a21" },
          bubble:  { them:   "#f1f3f8", themDark: "#232833" }
        },
        fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
      }
    }
  };
</script>
</head>

<body class="bg-page-light dark:bg-page-dark text-slate-800 dark:text-slate-100 h-screen overflow-hidden">
  <!-- Centered chat panel -->
  <div class="mx-auto flex h-full w-full max-w-[480px] flex-col bg-panel-light dark:bg-panel-dark shadow-xl sm:my-0">

    <!-- Header (minimal: contact + theme toggle only — no call/video/info buttons) -->
    <header class="flex h-16 flex-shrink-0 items-center justify-between border-b border-slate-200 px-4 dark:border-white/10">
      <div class="flex min-w-0 items-center gap-3">
        <div class="relative h-10 w-10 flex-shrink-0 overflow-hidden rounded-full bg-slate-200 dark:bg-white/10">
          <span class="flex h-full w-full items-center justify-center text-base font-semibold text-slate-500 dark:text-slate-300">AR</span>
        </div>
        <div class="min-w-0">
          <h1 class="truncate text-[15px] font-semibold leading-tight">Ana Reyes</h1>
          <div class="flex items-center gap-1.5">
            <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
            <span class="text-xs text-slate-500 dark:text-slate-400">Online</span>
          </div>
        </div>
      </div>
      <button id="themeToggle" type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full text-slate-500 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-white/10"
        aria-label="Switch theme">
        <span id="themeIcon" class="material-symbols-outlined" style="font-size:20px;">dark_mode</span>
      </button>
    </header>

    <!-- Auto-reply banner: shown when chat opens, dismissed when a real support representative replies -->
    <div id="autoReplyBanner" class="transform transition-all duration-300 ease-out">
      <div class="border-b border-slate-200 bg-blue-50 px-4 py-3 dark:border-white/10 dark:bg-blue-900/20">
        <div class="flex items-start gap-3">
          <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-blue-100 text-blue-600 dark:bg-blue-800/40 dark:text-blue-300">
            <span class="material-symbols-outlined" style="font-size:18px;">smart_toy</span>
          </div>
          <div class="flex-1">
            <div class="mb-1 flex items-center gap-2">
              <span class="text-sm font-semibold text-slate-800 dark:text-slate-100">Support Assistant</span>
              <span class="rounded bg-blue-200 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-blue-700 dark:bg-blue-800/50 dark:text-blue-200">Auto-Reply</span>
            </div>
            <p class="text-sm leading-relaxed text-slate-700 dark:text-slate-300">Hello! Thanks for contacting our support team. Please describe your issue or question in as much detail as possible so we can assist you effectively. A representative will respond shortly.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Conversation view -->
    <main id="messageCanvas"
      class="chat-scroll flex-1 space-y-3 overflow-y-auto bg-page-light px-4 py-5 dark:bg-page-dark">
      <!-- Messages are appended here by JavaScript -->
    </main>

    <!-- Typing indicator (shown while the counterpart is "typing") -->
    <div id="typingRow" class="hidden px-4 pb-2" style="display:none;">
      <div class="flex items-center gap-2">
        <div class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-bubble-them dark:bg-bubble-themDark">
          <span class="text-xs font-semibold text-slate-500 dark:text-slate-300">AR</span>
        </div>
        <div class="flex h-9 items-center gap-1 rounded-2xl rounded-bl-md bg-bubble-them px-3 dark:bg-bubble-themDark">
          <span class="h-1.5 w-1.5 rounded-full bg-slate-400 typing-dot"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-slate-400 typing-dot"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-slate-400 typing-dot"></span>
        </div>
      </div>
    </div>

    <!-- Input bar: photo attachment button + text input + send -->
    <footer class="flex-shrink-0 border-t border-slate-200 bg-panel-light px-3 py-3 dark:border-white/10 dark:bg-panel-dark">
      <!-- Pending photo preview -->
      <div id="photoPreview" class="mb-2 hidden items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 p-2 pr-3 dark:border-white/10 dark:bg-white/5" style="display:none;">
        <img id="photoPreviewImg" class="h-12 w-12 flex-shrink-0 rounded-lg object-cover" alt="Selected photo preview" />
        <div class="min-w-0 flex-1">
          <p class="truncate text-xs font-medium text-slate-600 dark:text-slate-300">Photo ready to send</p>
          <p id="photoPreviewName" class="truncate text-[11px] text-slate-400"></p>
        </div>
        <button id="photoRemove" type="button"
          class="flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-full text-slate-400 transition-colors hover:bg-slate-200 hover:text-slate-600 dark:hover:bg-white/10"
          aria-label="Remove photo">
          <span class="material-symbols-outlined" style="font-size:18px;">close</span>
        </button>
      </div>

      <div class="flex items-end gap-2">
        <!-- Photo attachment button -->
        <button id="photoButton" type="button"
          class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full text-slate-500 transition-colors hover:bg-slate-100 hover:text-brand dark:text-slate-300 dark:hover:bg-white/10"
          aria-label="Attach a photo" title="Attach a photo">
          <span class="material-symbols-outlined" style="font-size:22px;">photo</span>
        </button>
        <input id="photoInput" class="visually-hidden" type="file" accept="image/*" />

        <!-- Text input -->
        <textarea id="messageInput" rows="1"
          class="chat-scroll max-h-32 min-h-[40px] flex-1 resize-none rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[15px] leading-snug text-slate-800 outline-none transition-colors placeholder:text-slate-400 focus:border-brand dark:border-white/10 dark:bg-white/5 dark:text-slate-100 dark:placeholder:text-slate-500"
          placeholder="Type a message…"
          oninput="this.style.height=''; this.style.height=Math.min(this.scrollHeight,128)+'px'"></textarea>

        <!-- Send button -->
        <button id="sendButton" type="button"
          class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-brand text-white transition-transform hover:scale-105 active:scale-95 disabled:cursor-not-allowed disabled:opacity-40"
          aria-label="Send message" title="Send" disabled>
          <span class="material-symbols-outlined" style="font-size:20px;">send</span>
        </button>
      </div>
    </footer>
  </div>

  <!-- Lightbox for viewing photos full-size -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-6 backdrop-blur-sm" style="display:none;">
    <button id="lightboxClose" class="absolute right-5 top-5 flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white transition-colors hover:bg-white/20" aria-label="Close">
      <span class="material-symbols-outlined" style="font-size:24px;">close</span>
    </button>
    <img id="lightboxImg" class="max-h-[85vh] max-w-full rounded-2xl object-contain shadow-2xl" alt="Photo" />
  </div>

<script>
(function () {
  "use strict";

  /* ---------------------------------------------------------------
   * Theme (light / dark) — kept as a viewing preference, not a
   * communication feature, so the chat stays minimal by design.
   * ------------------------------------------------------------- */
  var root = document.documentElement;
  var themeToggle = document.getElementById("themeToggle");
  var themeIcon = document.getElementById("themeIcon");
  var savedTheme = localStorage.getItem("chat-theme");
  var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  var currentTheme = savedTheme || (prefersDark ? "dark" : "light");

  function applyTheme(theme) {
    currentTheme = theme;
    var isDark = theme === "dark";
    root.classList.toggle("dark", isDark);
    themeIcon.textContent = isDark ? "light_mode" : "dark_mode";
    localStorage.setItem("chat-theme", theme);
  }
  applyTheme(currentTheme);
  themeToggle.addEventListener("click", function () {
    applyTheme(currentTheme === "dark" ? "light" : "dark");
  });

  /* ---------------------------------------------------------------
   * DOM references
   * ------------------------------------------------------------- */
  var canvas       = document.getElementById("messageCanvas");
  var autoReplyBanner = document.getElementById("autoReplyBanner");
  var input        = document.getElementById("messageInput");
  var sendBtn      = document.getElementById("sendButton");
  var photoButton  = document.getElementById("photoButton");
  var photoInput   = document.getElementById("photoInput");
  var photoPreview = document.getElementById("photoPreview");
  var photoPreviewImg = document.getElementById("photoPreviewImg");
  var photoPreviewName = document.getElementById("photoPreviewName");
  var photoRemove  = document.getElementById("photoRemove");
  var typingRow    = document.getElementById("typingRow");
  var lightbox     = document.getElementById("lightbox");
  var lightboxImg  = document.getElementById("lightboxImg");
  var lightboxClose = document.getElementById("lightboxClose");

  var pendingPhoto = null; // { url, name }

  /* ---------------------------------------------------------------
   * Helpers
   * ------------------------------------------------------------- */
  function nowTime() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes().toString().padStart(2, "0");
    var ap = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return h + ":" + m + " " + ap;
  }
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function scrollToBottom() {
    canvas.scrollTop = canvas.scrollHeight;
  }
  function updateSendState() {
    var hasText = input.value.trim().length > 0;
    sendBtn.disabled = !hasText && !pendingPhoto;
  }

  /* ---------------------------------------------------------------
   * Auto-reply dismissal: once the support rep sends a message the
   * auto-reply banner is considered served and can be hidden.
   * ------------------------------------------------------------- */
  var repJoined = false;
  function markRepresentativeJoined() {
    if (repJoined || !autoReplyBanner) return;
    repJoined = true;
    autoReplyBanner.classList.add("opacity-0", "-translate-y-2");
    window.setTimeout(function () {
      autoReplyBanner.style.display = "none";
    }, 300);
  }

  /* ---------------------------------------------------------------
   * Message rendering (append-only for smooth per-message animation)
   * ------------------------------------------------------------- */
  function buildRow(innerHtml, alignEnd) {
    var row = document.createElement("div");
    row.className = "msg-in flex " + (alignEnd ? "justify-end" : "justify-start");
    row.innerHTML = innerHtml;
    return row;
  }

  function appendText(from, text) {
    var isMe = from === "me";
    var inner =
      '<div class="max-w-[78%] ' + (isMe ? "items-end" : "items-start") + ' flex flex-col gap-1">' +
        '<div class="' + (isMe
          ? "rounded-2xl rounded-br-md bg-brand px-3.5 py-2.5 text-white"
          : "rounded-2xl rounded-bl-md bg-bubble-them px-3.5 py-2.5 text-slate-800 dark:bg-bubble-themDark dark:text-slate-100") + '">' +
          '<p class="whitespace-pre-wrap break-words text-[15px] leading-snug">' + escapeHtml(text) + '</p>' +
        '</div>' +
        '<span class="px-1 text-[11px] text-slate-400">' + nowTime() + '</span>' +
      '</div>';
    canvas.appendChild(buildRow(inner, isMe));
    scrollToBottom();
  }

  function appendPhoto(from, url, caption) {
    var isMe = from === "me";
    var cap = caption
      ? '<p class="mt-1.5 whitespace-pre-wrap break-words text-[14px] leading-snug ' + (isMe ? "text-white/90" : "text-slate-700 dark:text-slate-200") + '">' + escapeHtml(caption) + '</p>'
      : "";
    var inner =
      '<div class="max-w-[78%] ' + (isMe ? "items-end" : "items-start") + ' flex flex-col gap-1">' +
        '<button class="block overflow-hidden rounded-2xl ' + (isMe ? "rounded-br-md" : "rounded-bl-md") + ' border border-black/5 shadow-sm transition-transform hover:scale-[1.01] dark:border-white/10" data-photo="' + escapeHtml(url) + '">' +
          '<img src="' + escapeHtml(url) + '" class="max-h-72 w-auto max-w-full object-cover" alt="Shared photo" loading="lazy" />' +
        '</button>' +
        cap +
        '<span class="px-1 text-[11px] text-slate-400">' + nowTime() + '</span>' +
      '</div>';
    canvas.appendChild(buildRow(inner, isMe));
    // open lightbox on photo tap
    canvas.lastChild.querySelector("[data-photo]").addEventListener("click", function () {
      openLightbox(url);
    });
    scrollToBottom();
  }

  /* ---------------------------------------------------------------
   * Photo selection (working attachment)
   * ------------------------------------------------------------- */
  photoButton.addEventListener("click", function () { photoInput.click(); });

  photoInput.addEventListener("change", function (e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    if (pendingPhoto) URL.revokeObjectURL(pendingPhoto.url);
    pendingPhoto = { url: URL.createObjectURL(file), name: file.name };
    photoPreviewImg.src = pendingPhoto.url;
    photoPreviewName.textContent = pendingPhoto.name;
    photoPreview.style.display = "flex";
    updateSendState();
    input.focus();
    // reset input so the same file can be re-selected later
    photoInput.value = "";
  });

  photoRemove.addEventListener("click", function () {
    if (pendingPhoto) { URL.revokeObjectURL(pendingPhoto.url); pendingPhoto = null; }
    photoPreview.style.display = "none";
    photoPreviewImg.removeAttribute("src");
    photoPreviewName.textContent = "";
    updateSendState();
  });

  /* ---------------------------------------------------------------
   * Send (text and/or photo)
   * ------------------------------------------------------------- */
  function send() {
    var text = input.value.trim();
    var photo = pendingPhoto;
    if (!text && !photo) return;

    if (photo) {
      appendPhoto("me", photo.url, text); // photo with optional text caption
    } else {
      appendText("me", text);
    }

    // reset composer
    input.value = "";
    input.style.height = "";
    if (pendingPhoto) { URL.revokeObjectURL(pendingPhoto.url); pendingPhoto = null; }
    photoPreview.style.display = "none";
    photoPreviewImg.removeAttribute("src");
    photoPreviewName.textContent = "";
    updateSendState();
    markRepresentativeJoined();
    simulateReply(!!photo);
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("input", updateSendState);
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  /* ---------------------------------------------------------------
   * Light simulated reply so two-way messaging is visibly working
   * ------------------------------------------------------------- */
  var repliesText  = ["Got it, thanks! 👍", "Sounds good.", "Noted — I'll take a look.", "Perfect, talk soon!"];
  var repliesPhoto = ["Nice photo, thanks for sharing! 📷", "Looks great 👀", "Got the picture, appreciate it!"];
  function simulateReply(wasPhoto) {
    typingRow.style.display = "block";
    scrollToBottom();
    var delay = 900 + Math.random() * 700;
    window.setTimeout(function () {
      typingRow.style.display = "none";
      var pool = wasPhoto ? repliesPhoto : repliesText;
      appendText("them", pool[Math.floor(Math.random() * pool.length)]);
    }, delay);
  }

  /* ---------------------------------------------------------------
   * Lightbox
   * ------------------------------------------------------------- */
  function openLightbox(url) {
    lightboxImg.src = url;
    lightbox.style.display = "flex";
  }
  function closeLightbox() {
    lightbox.style.display = "none";
    lightboxImg.removeAttribute("src");
  }
  lightboxClose.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", function (e) {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeLightbox();
  });

  /* ---------------------------------------------------------------
   * Seed conversation (proves both text + photo rendering)
   * ------------------------------------------------------------- */
  appendText("them", "Hey! This is a minimal chat — just text and photos. Try sending me a message or a picture 📷");
  updateSendState();
  scrollToBottom();
})();
</script>
</body>
</html>
